<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑耗材配置 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="edit-consumable-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container modal-lg" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">编辑耗材配置</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">耗材编号</label>
                        <input type="text" class="form-input mono-text" value="MAT-2024-001" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">耗材名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" value="DNA提取试剂盒">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">规格型号 <span class="required">*</span></label>
                        <input type="text" class="form-input" value="v2.0，96次反应">
                    </div>
                    <div class="form-group">
                        <label class="form-label">默认单位 <span class="required">*</span></label>
                        <select class="form-select">
                            <option value="piece">个</option>
                            <option value="box" selected>盒</option>
                            <option value="bag">包</option>
                            <option value="bottle">瓶</option>
                            <option value="set">套</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">包装规格</label>
                        <input type="text" class="form-input" value="1盒/单位">
                    </div>
                    <div class="form-group">
                        <label class="form-label">所属分类</label>
                        <select class="form-select">
                            <option value="">选择分类</option>
                            <option value="reagent" selected>试剂 > 核酸提取试剂</option>
                            <option value="consumable">耗材</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">安全库存</label>
                        <input type="number" class="form-input" value="10">
                    </div>
                    <div class="form-group">
                        <label class="form-label">最大库存</label>
                        <input type="number" class="form-input" value="50">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">备注</label>
                        <textarea class="form-textarea" rows="2">用于从样本中提取DNA的试剂盒</textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-danger btn-sm" style="margin-right: auto;">删除耗材</button>
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">保存修改</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
