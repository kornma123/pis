<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑BOM物料 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="edit-bom-item-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">编辑BOM物料</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">物料名称</label>
                        <input type="text" class="form-input" value="DNA提取试剂盒 v2.0" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">规格型号</label>
                        <input type="text" class="form-input" value="96次反应" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label">参考单价</label>
                        <input type="text" class="form-input" value="¥1,280.00" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">单例用量 <span class="required">*</span></label>
                        <input type="number" class="form-input" value="0.0104" step="0.0001" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">单位</label>
                        <select class="form-select">
                            <option value="box" selected>盒</option>
                            <option value="piece">个</option>
                            <option value="ml">ml</option>
                            <option value="set">套</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">备注</label>
                        <input type="text" class="form-input" placeholder="可选填">
                    </div>
                </div>
            </div>
            <div style="margin-top: 16px; padding: 12px; background: var(--bg-page); border-radius: 6px; font-size: 13px;">
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">单样本成本:</span>
                    <span style="font-weight: 600; color: var(--text-primary);">¥13.33</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-danger btn-sm" style="margin-right: auto;">删除此物料</button>
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">保存修改</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
