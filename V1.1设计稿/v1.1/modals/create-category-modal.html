<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建类目 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="create-category-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">新建类目</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目级别 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="category-level" value="1" checked>
                                <span>一级类目</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="category-level" value="2">
                                <span>二级类目</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="category-level" value="3">
                                <span>三级类目</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">上级类目</label>
                        <select class="form-select">
                            <option value="">无（作为一级类目）</option>
                            <option value="1">试剂</option>
                            <option value="2">耗材</option>
                            <option value="3">设备</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="输入类目名称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目编码</label>
                        <input type="text" class="form-input mono-text" placeholder="系统自动生成" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目描述</label>
                        <textarea class="form-textarea" rows="2" placeholder="可选填"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">创建类目</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
