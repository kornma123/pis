<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材详情 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="consumable-detail-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container modal-lg" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">耗材详情</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="detail-header">
                <div class="detail-title">DNA提取试剂盒</div>
                <div class="detail-subtitle">MAT-2024-001</div>
            </div>
            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-label">规格型号</div>
                    <div class="detail-value">v2.0，96次反应</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">默认单位</div>
                    <div class="detail-value">盒</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">包装规格</div>
                    <div class="detail-value">1盒/单位</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">所属分类</div>
                    <div class="detail-value">试剂 > 核酸提取试剂</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">安全库存</div>
                    <div class="detail-value">10 盒</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">最大库存</div>
                    <div class="detail-value">50 盒</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">当前库存</div>
                    <div class="detail-value">25 盒</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">库存状态</div>
                    <div class="detail-value"><span class="status-badge status-success">正常</span></div>
                </div>
            </div>
            <div class="detail-section" style="margin-top: 24px;">
                <h4 class="detail-title">关联BOM清单</h4>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>BOM名称</th>
                            <th>关联项目</th>
                            <th>单例用量</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>NGS建库试剂套装</td>
                            <td>全外显子组测序</td>
                            <td>0.0104 盒</td>
                            <td><span class="status-badge status-success">已启用</span></td>
                        </tr>
                        <tr>
                            <td>PCR扩增试剂套装</td>
                            <td>肿瘤基因突变检测</td>
                            <td>0.0208 盒</td>
                            <td><span class="status-badge status-success">已启用</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary">关闭</button>
            <button class="btn btn-primary">编辑</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
