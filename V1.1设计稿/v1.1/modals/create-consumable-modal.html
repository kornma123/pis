<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增耗材配置 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="create-consumable-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container modal-lg" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">新增耗材配置</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">耗材名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="输入耗材名称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">规格型号 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="如: 1.5ml，无色，无菌">
                    </div>
                    <div class="form-group">
                        <label class="form-label">默认单位 <span class="required">*</span></label>
                        <select class="form-select">
                            <option value="piece">个</option>
                            <option value="box">盒</option>
                            <option value="bag">包</option>
                            <option value="bottle">瓶</option>
                            <option value="set">套</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">包装规格</label>
                        <input type="text" class="form-input" placeholder="如: 500个/包">
                    </div>
                    <div class="form-group">
                        <label class="form-label">所属分类</label>
                        <select class="form-select">
                            <option value="">选择分类</option>
                            <option value="tube">离心管</option>
                            <option value="tip">吸头</option>
                            <option value="plate">PCR板</option>
                            <option value="glove">手套</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">安全库存</label>
                        <input type="number" class="form-input" placeholder="输入安全库存数量">
                    </div>
                    <div class="form-group">
                        <label class="form-label">最大库存</label>
                        <input type="number" class="form-input" placeholder="输入最大库存数量">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">备注</label>
                        <textarea class="form-textarea" rows="2" placeholder="可选填"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">保存配置</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
