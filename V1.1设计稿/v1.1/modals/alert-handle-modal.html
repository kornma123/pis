<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>处理预警 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="alert-handle-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">处理预警</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="alert-detail" style="background: var(--error-bg); border: 1px solid var(--error); border-radius: 8px; padding: 16px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <span style="font-weight: 600; color: var(--error);">库存不足预警</span>
                </div>
                <div style="font-size: 14px; color: var(--text-secondary);">
                    <div style="margin-bottom: 8px;"><strong>物料：</strong>DNA提取试剂盒 (LOT-2024-A001)</div>
                    <div style="margin-bottom: 8px;"><strong>当前库存：</strong>3盒</div>
                    <div><strong>预警阈值：</strong>10盒</div>
                </div>
            </div>
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">处理意见 <span class="required">*</span></label>
                        <textarea class="form-textarea" placeholder="请输入处理意见..."></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">处理结果</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="result" checked> 已采购补货</label>
                            <label class="radio-label"><input type="radio" name="result"> 调整阈值</label>
                            <label class="radio-label"><input type="radio" name="result"> 忽略预警</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">确认处理</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
