<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑类目 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="edit-category-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">编辑类目</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目编码</label>
                        <input type="text" class="form-input mono-text" value="CAT-001-001" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" value="DNA提取试剂">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">上级类目</label>
                        <input type="text" class="form-input" value="试剂 > 核酸提取试剂" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">排序权重</label>
                        <input type="number" class="form-input" value="1" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">类目描述</label>
                        <textarea class="form-textarea" rows="2">用于从样本中提取DNA的试剂产品</textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-danger btn-sm" style="margin-right: auto;">删除类目</button>
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">保存修改</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
