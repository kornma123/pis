log_format coreone_json escape=json
    '{"timestamp":"$time_iso8601","level":"info","component":"frontend",'
    '"request_id":"$request_id","method":"$request_method","uri":"$uri",'
    '"status":$status,"bytes":$body_bytes_sent,"duration":$request_time}';

access_log /dev/stdout coreone_json;
error_log /dev/stderr warn;

server {
    listen 8080;
    server_name localhost;
    server_tokens off;

    add_header X-Request-ID $request_id always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location /api/v1/ {
        proxy_pass http://backend:3001/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # This topology has exactly one application proxy. Discard any
        # client-supplied chain and emit only Nginx's directly observed peer.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
