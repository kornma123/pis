default_permissions = "patch-review"

[permissions.patch-review]
description = "Read the isolated PR patch and deny general runner filesystem access."

[permissions.patch-review.filesystem]
":root" = "deny"
":minimal" = "read"
":tmpdir" = "deny"
":slash_tmp" = "deny"

[permissions.patch-review.filesystem.":workspace_roots"]
"." = "read"

[permissions.patch-review.network]
enabled = false
