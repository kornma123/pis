name: E2E Required

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-required-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: development

jobs:
  e2e-required:
    name: e2e-required
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1

      - name: Plan impacted E2E specs
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" || -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            node scripts/e2e/plan-pr-e2e.cjs \
              --changed-file=.github/workflows/e2e.yml \
              --format=lines > .e2e-specs.txt
          else
            node scripts/e2e/plan-pr-e2e.cjs \
              --base="$BASE_SHA" \
              --head="$HEAD_SHA" \
              --format=lines > .e2e-specs.txt
          fi
          if [[ -s .e2e-specs.txt ]]; then
            echo "has_specs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_specs=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### E2E impact plan"
            echo ""
            echo '```text'
            if [[ -s .e2e-specs.txt ]]; then cat .e2e-specs.txt; else echo "No E2E-relevant source change."; fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate ephemeral CI JWT secret
        if: steps.plan.outputs.has_specs == 'true'
        shell: bash
        run: |
          jwt_secret="$(openssl rand -base64 48)"
          echo "::add-mask::$jwt_secret"
          echo "JWT_SECRET=$jwt_secret" >> "$GITHUB_ENV"
          unset jwt_secret

      - name: Install backend dependencies
        if: steps.plan.outputs.has_specs == 'true'
        working-directory: 后端代码/server
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install frontend dependencies
        if: steps.plan.outputs.has_specs == 'true'
        working-directory: 前端代码
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Chromium
        if: steps.plan.outputs.has_specs == 'true'
        working-directory: 前端代码
        run: npx playwright install --with-deps chromium

      - name: Run core and impacted E2E specs
        if: steps.plan.outputs.has_specs == 'true'
        working-directory: 前端代码
        shell: bash
        run: |
          mapfile -t specs < ../.e2e-specs.txt
          npx playwright test "${specs[@]}" --reporter=list --workers=1
        env:
          CI: true

      - name: Upload E2E evidence
        if: always() && steps.plan.outputs.has_specs == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-required-${{ github.run_id }}
          path: |
            .e2e-specs.txt
            前端代码/e2e-report/
            前端代码/test-results/
          if-no-files-found: warn
          retention-days: 14
