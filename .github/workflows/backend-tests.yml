name: Backend Tests (golden)

# 后端 vitest 门禁：守黄金锚 ¥27,870（纯实验室收入拆分）/ ¥13,152（partner 收入）。
# 背景：此前全项目 CI 只有 e2e（Playwright），无任何 vitest 门禁；破坏黄金的 PR 在 GitHub 上不会变红。
# 见 docs/COREONE-工作模型调研-…-2026-07-01.md §〇.B。

on:
  push:
    branches: [master, main]
    # 纯文档/治理改动跳过**合并后**的重复 vitest（PR 时已跑过）。
    paths-ignore: ['**.md', 'docs/**', '.claude/**']
  # ⚠️ pull_request 故意**不加 paths-ignore**：`vitest` 是 master 的 required status check。
  #    若 PR 因 paths-ignore 整体跳过本 job，required 检查永不上报 → PR 卡在 "Expected/Waiting"
  #    无法合并。所以 PR 侧一律跑（纯文档 PR 也就多花约 1 分钟，可接受）。
  #    要让 PR 侧也对文档跳过，需另加同名 no-op 占位 workflow（GitHub 官方方案）——见 docs/PM待拍板.md，暂不做。
  pull_request:
    branches: [master, main, feat/phase2-lab-revenue-split]

permissions:
  contents: read

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: 后端代码/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Generate ephemeral CI JWT secret
        shell: bash
        run: echo "JWT_SECRET=$(openssl rand -base64 48)" >> "$GITHUB_ENV"
      - name: Install
        run: npm ci
      - name: Run backend vitest (含 golden ¥27,870 / ¥13,152)
        # test:node = node --experimental-sqlite ... vitest run（node:sqlite 需该 flag）
        run: npm run test:node
