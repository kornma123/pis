name: Secret Scan

# 防复发机器门：扫描最终工作树 + 本次 PR/推送内每个提交的变更文件状态，
# 阻止“先提交密钥、后删除”伪装成干净最终树。提升 required 前还须建立不可由 PR 自改的
# 信任根（受信基线/固定外部扫描器或 CODEOWNERS + required review），并获得 PM 明确批准。

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

# 安全事件必须逐次完整扫描：不要设置 workflow 级 concurrency。
# 后续推送既不能取消正在运行的旧事件，也不能替换尚在排队的旧事件。

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Self-test scanner invariants
        run: node scripts/check-no-secrets.selftest.cjs
      - name: Scan PR commit states and tracked files
        if: github.event_name == 'pull_request'
        run: node scripts/check-no-secrets.cjs --range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
      - name: Scan pushed commit states and tracked files
        if: github.event_name == 'push'
        run: node scripts/check-no-secrets.cjs --range "${{ github.event.before }}..${{ github.sha }}"
