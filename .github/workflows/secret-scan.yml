name: Secret Scan

# 防复发机器门（2026-07-09 安全止血）：禁止已知泄露密钥字面值 / 云厂商 API Key / 私钥进入版本库。
# 见 scripts/check-no-secrets.cjs（窄规则 + `secret-scan:allow` 允许清单）。
# 注：初始按普通 check 落地（非 required）。是否提升为 master required check 归 PM 决策（docs/PM待拍板.md）。

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Scan tracked files for leaked secrets
        run: node scripts/check-no-secrets.cjs
