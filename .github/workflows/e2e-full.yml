name: E2E Full Regression

# 手动触发或每晚运行完整回归测试
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CI 专用一次性密钥（绝非生产值）。后端 .env 已从版本库移除，playwright webServer 启动的
  # 后端（tsx src/app.ts）需要非空 JWT_SECRET 才能启动。真实密钥仅经部署环境注入。
  JWT_SECRET: ci-throwaway-not-a-real-secret-do-not-use-in-prod
  # E2E 后端以 development 运行：fail-closed 安全默认下，仅显式 dev/test 才种夹具账号（E2E 登录依赖）。
  NODE_ENV: development

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 小时，完整回归需要更长时间

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: 后端代码/server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: 前端代码
        run: npm ci

      - name: Install Playwright browsers
        working-directory: 前端代码
        run: npx playwright install --with-deps chromium

      - name: Run full E2E tests
        working-directory: 前端代码
        run: npx playwright test --reporter=list --workers=1
        env:
          CI: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-full
          path: 前端代码/e2e-report/
          retention-days: 7
