name: Issue Handoff Integrity

# Candidate checker changes are tested in an unprivileged pull_request job.
# The trusted pull_request_target job never executes candidate PR code.
on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'scripts/issue-handoff/**'
      - '.github/workflows/issue-handoff.yml'
      - '.github/workflows/issue-handoff-integrity.yml'

permissions:
  contents: read

concurrency:
  group: issue-handoff-integrity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integrity:
    name: issue-handoff-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR merge commit without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Check syntax and run deterministic self-test
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/issue-handoff/check-pr-body.cjs
          node --check scripts/issue-handoff/check-pr-body.selftest.cjs
          node scripts/issue-handoff/check-pr-body.selftest.cjs

      - name: Lint Issue handoff workflows with actionlint v1.7.12
        shell: bash
        env:
          ACTIONLINT_VERSION: '1.7.12'
          ACTIONLINT_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
        run: |
          set -euo pipefail

          archive="${RUNNER_TEMP}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          bindir="${RUNNER_TEMP}/actionlint-${ACTIONLINT_VERSION}"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"

          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors \
            --connect-timeout 15 --max-time 120 \
            --proto '=https' --tlsv1.2 \
            --output "${archive}" "${url}"

          printf '%s  %s\n' "${ACTIONLINT_SHA256}" "${archive}" \
            | sha256sum --check --strict -

          mkdir -p "${bindir}"
          tar -xzf "${archive}" -C "${bindir}" actionlint
          "${bindir}/actionlint" -version
          "${bindir}/actionlint" -shellcheck= -pyflakes= \
            .github/workflows/issue-handoff.yml \
            .github/workflows/issue-handoff-integrity.yml
