version: '3.8'

services:
  backend:
    build:
      context: ./后端代码/server
      dockerfile: Dockerfile
    container_name: coreone-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      # 安全：绝不内置默认密钥。JWT_SECRET 必须由部署环境注入（缺失即拒绝启动）。
      # 生成示例：openssl rand -base64 48
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — inject a strong random secret via the deploy environment; the old default was leaked and must not be reused}
      - JWT_EXPIRES_IN=8h
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - DATABASE_PATH=/app/data/coreone.db
    volumes:
      - coreone-data:/app/data
    networks:
      - coreone-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./前端代码
      dockerfile: Dockerfile
    container_name: coreone-frontend
    restart: unless-stopped
    ports:
      - "${COREONE_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - coreone-network

networks:
  coreone-network:
    driver: bridge

volumes:
  coreone-data:
    driver: local
